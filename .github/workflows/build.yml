name: build

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-rust:
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - name: Check code format
        run: cargo fmt --all -- --check
      - name: Check the package for errors
        run: cargo check --all
      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features --tests --benches -- -D warnings
      - name: Execute rust tests
        run: cargo nextest run --all-features
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        if: startsWith(github.ref, 'refs/tags/')
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.git-cliff.outputs.content }}

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: rustack:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image starts and passes health check
        run: |
          docker run -d --name rustack-ci \
            -p 4566:4566 \
            rustack:ci

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4566/_localstack/health > /dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Docker container did not become healthy within 30s"
              docker logs rustack-ci
              exit 1
            fi
            sleep 1
          done

          # Verify all services are reported as running.
          # 17 services + apigatewayv2-execution router = 18 entries.
          HEALTH=$(curl -sf http://127.0.0.1:4566/_localstack/health)
          echo "$HEALTH" | jq .

          RUNNING_COUNT=$(echo "$HEALTH" | jq '[.services | to_entries[] | select(.value == "running")] | length')
          echo "Running services: $RUNNING_COUNT"
          if [ "$RUNNING_COUNT" -lt 18 ]; then
            echo "::error::Expected 18 running services, got $RUNNING_COUNT"
            exit 1
          fi

      - name: Print Docker image size
        run: docker images rustack:ci --format '{{.Size}}'

      - name: Cleanup
        if: always()
        run: docker rm -f rustack-ci 2>/dev/null || true
