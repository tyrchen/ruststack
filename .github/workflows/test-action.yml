name: test-action

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to test"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: read

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Default configuration — verify action basics and all services
  # ─────────────────────────────────────────────────────────────────────
  default-config:
    name: "Action: default config + all-service smoke tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack via action (defaults)
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}

      # ── Verify outputs ────────────────────────────────────────────────
      - name: "Verify: action outputs are set"
        run: |
          set -euo pipefail

          ENDPOINT="${{ steps.rustack.outputs.endpoint }}"
          CONTAINER_ID="${{ steps.rustack.outputs.container-id }}"

          echo "endpoint=$ENDPOINT"
          echo "container-id=$CONTAINER_ID"

          [ "$ENDPOINT" = "http://localhost:4566" ]
          [ -n "$CONTAINER_ID" ]

          # Container must be running
          docker inspect --format='{{.State.Running}}' "$CONTAINER_ID" | grep -q "true"

      # ── Verify exported env vars ──────────────────────────────────────
      - name: "Verify: environment variables are exported"
        run: |
          set -euo pipefail

          [ "$AWS_ENDPOINT_URL" = "http://localhost:4566" ]
          [ "$LOCALSTACK_ENDPOINT" = "http://localhost:4566" ]
          [ "$AWS_DEFAULT_REGION" = "us-east-1" ]
          [ "$AWS_ACCESS_KEY_ID" = "test" ]
          [ "$AWS_SECRET_ACCESS_KEY" = "test" ]

          echo "All environment variables verified"

      # ── Verify health endpoint ────────────────────────────────────────
      - name: "Verify: health endpoint reports all 18 services running"
        run: |
          set -euo pipefail

          HEALTH=$(curl -sf http://localhost:4566/_localstack/health)
          echo "$HEALTH" | jq .

          RUNNING=$(echo "$HEALTH" | jq '[.services | to_entries[] | select(.value == "running")] | length')
          echo "Running services: $RUNNING"
          if [ "$RUNNING" -lt 18 ]; then
            echo "::error::Expected >= 18 running services, got $RUNNING"
            exit 1
          fi

      # ── Verify alternative health paths ───────────────────────────────
      - name: "Verify: alternative health endpoints"
        run: |
          set -euo pipefail

          curl -sf http://localhost:4566/_health > /dev/null
          curl -sf http://localhost:4566/health > /dev/null
          curl -sf http://localhost:4566/minio/health/live > /dev/null
          curl -sf http://localhost:4566/minio/health/ready > /dev/null
          curl -sf http://localhost:4566/minio/health/cluster > /dev/null

          echo "All health endpoints respond"

      # ── S3 smoke test ─────────────────────────────────────────────────
      - name: "S3: bucket + object CRUD"
        run: |
          set -euo pipefail

          aws s3api create-bucket --bucket action-test-s3
          echo "s3 works" > /tmp/s3.txt
          aws s3api put-object --bucket action-test-s3 --key test.txt --body /tmp/s3.txt
          aws s3api get-object --bucket action-test-s3 --key test.txt /tmp/s3-dl.txt
          diff /tmp/s3.txt /tmp/s3-dl.txt

          aws s3api head-object --bucket action-test-s3 --key test.txt | grep -q "ContentLength"
          aws s3api list-objects-v2 --bucket action-test-s3 | jq -e '.Contents | length == 1'

          aws s3api delete-object --bucket action-test-s3 --key test.txt
          aws s3api delete-bucket --bucket action-test-s3
          echo "S3 OK"

      # ── DynamoDB smoke test ───────────────────────────────────────────
      - name: "DynamoDB: table + item CRUD"
        run: |
          set -euo pipefail

          aws dynamodb create-table \
            --table-name action-test-ddb \
            --attribute-definitions AttributeName=pk,AttributeType=S \
            --key-schema AttributeName=pk,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST

          aws dynamodb put-item --table-name action-test-ddb \
            --item '{"pk":{"S":"key1"},"data":{"S":"hello"}}'

          ITEM=$(aws dynamodb get-item --table-name action-test-ddb \
            --key '{"pk":{"S":"key1"}}' --query "Item.data.S" --output text)
          [ "$ITEM" = "hello" ]

          aws dynamodb delete-table --table-name action-test-ddb
          echo "DynamoDB OK"

      # ── DynamoDB Streams smoke test ───────────────────────────────────
      - name: "DynamoDB Streams: stream + describe"
        run: |
          set -euo pipefail

          aws dynamodb create-table \
            --table-name action-test-streams \
            --attribute-definitions AttributeName=pk,AttributeType=S \
            --key-schema AttributeName=pk,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --stream-specification StreamEnabled=true,StreamViewType=NEW_AND_OLD_IMAGES

          STREAM_ARN=$(aws dynamodb describe-table --table-name action-test-streams \
            --query "Table.LatestStreamArn" --output text)
          [ "$STREAM_ARN" != "None" ] && [ -n "$STREAM_ARN" ]

          STREAM=$(aws dynamodbstreams describe-stream --stream-arn "$STREAM_ARN")
          echo "$STREAM" | jq -e '.StreamDescription.StreamStatus'

          aws dynamodb delete-table --table-name action-test-streams
          echo "DynamoDB Streams OK"

      # ── SQS smoke test ────────────────────────────────────────────────
      - name: "SQS: queue + send/receive message"
        run: |
          set -euo pipefail

          QUEUE_URL=$(aws sqs create-queue --queue-name action-test-sqs \
            | jq -r '.QueueUrl')

          aws sqs send-message --queue-url "$QUEUE_URL" --message-body "hello-sqs"

          MSG=$(aws sqs receive-message --queue-url "$QUEUE_URL" \
            --max-number-of-messages 1 --query "Messages[0].Body" --output text)
          [ "$MSG" = "hello-sqs" ]

          aws sqs delete-queue --queue-url "$QUEUE_URL"
          echo "SQS OK"

      # ── SNS smoke test ────────────────────────────────────────────────
      - name: "SNS: topic + publish"
        run: |
          set -euo pipefail

          TOPIC_ARN=$(aws sns create-topic --name action-test-sns \
            --query "TopicArn" --output text)

          MSG_ID=$(aws sns publish --topic-arn "$TOPIC_ARN" \
            --message "hello-sns" --query "MessageId" --output text)
          [ -n "$MSG_ID" ]

          aws sns delete-topic --topic-arn "$TOPIC_ARN"
          echo "SNS OK"

      # ── SSM smoke test ────────────────────────────────────────────────
      - name: "SSM: put/get parameter"
        run: |
          set -euo pipefail

          aws ssm put-parameter --name /action-test/param \
            --value "hello-ssm" --type String

          VAL=$(aws ssm get-parameter --name /action-test/param \
            --query "Parameter.Value" --output text)
          [ "$VAL" = "hello-ssm" ]

          aws ssm delete-parameter --name /action-test/param
          echo "SSM OK"

      # ── Lambda smoke test ─────────────────────────────────────────────
      - name: "Lambda: list functions + get account settings"
        run: |
          set -euo pipefail

          aws lambda list-functions | jq -e '.Functions'
          aws lambda get-account-settings | jq -e '.AccountLimit'
          echo "Lambda OK"

      # ── CloudWatch smoke test ─────────────────────────────────────────
      - name: "CloudWatch: put metric + list metrics"
        run: |
          set -euo pipefail

          aws cloudwatch put-metric-data --namespace ActionTest \
            --metric-name TestMetric --value 42 --unit Count

          aws cloudwatch list-metrics --namespace ActionTest \
            | jq -e '.Metrics | length >= 1'

          # Put an alarm so describe-alarms has data to return
          aws cloudwatch put-metric-alarm \
            --alarm-name action-test-alarm \
            --namespace ActionTest \
            --metric-name TestMetric \
            --statistic Average \
            --period 60 \
            --evaluation-periods 1 \
            --threshold 100 \
            --comparison-operator GreaterThanThreshold

          FOUND=$(aws cloudwatch describe-alarms \
            --alarm-names action-test-alarm \
            --query "length(MetricAlarms || \`[]\`)" --output text)
          echo "Alarm count: $FOUND"
          [ "$FOUND" -ge 1 ]

          aws cloudwatch delete-alarms --alarm-names action-test-alarm
          echo "CloudWatch OK"

      # ── Events (EventBridge) smoke test ───────────────────────────────
      - name: "Events: put rule + describe"
        run: |
          set -euo pipefail

          aws events put-rule --name action-test-rule \
            --schedule-expression "rate(1 hour)" \
            --state DISABLED

          aws events describe-rule --name action-test-rule \
            | jq -e '.Name == "action-test-rule"'

          aws events delete-rule --name action-test-rule
          echo "Events OK"

      # ── Kinesis smoke test ────────────────────────────────────────────
      - name: "Kinesis: create stream + put/get records"
        run: |
          set -euo pipefail

          aws kinesis create-stream --stream-name action-test-kinesis --shard-count 1

          # Wait for ACTIVE
          for i in $(seq 1 15); do
            STATUS=$(aws kinesis describe-stream --stream-name action-test-kinesis \
              --query "StreamDescription.StreamStatus" --output text)
            [ "$STATUS" = "ACTIVE" ] && break
            sleep 1
          done
          [ "$STATUS" = "ACTIVE" ]

          aws kinesis put-record --stream-name action-test-kinesis \
            --partition-key pk1 --data "$(echo -n 'hello-kinesis' | base64)" \
            | jq -e '.ShardId'

          SHARD_ITER=$(aws kinesis get-shard-iterator \
            --stream-name action-test-kinesis \
            --shard-id shardId-000000000000 \
            --shard-iterator-type TRIM_HORIZON \
            --query "ShardIterator" --output text)

          aws kinesis get-records --shard-iterator "$SHARD_ITER" \
            | jq -e '.Records | length >= 1'

          aws kinesis delete-stream --stream-name action-test-kinesis
          echo "Kinesis OK"

      # ── CloudWatch Logs smoke test ────────────────────────────────────
      - name: "Logs: log group + put events"
        run: |
          set -euo pipefail

          aws logs create-log-group --log-group-name /action-test/logs
          aws logs create-log-stream \
            --log-group-name /action-test/logs --log-stream-name stream1

          aws logs put-log-events \
            --log-group-name /action-test/logs --log-stream-name stream1 \
            --log-events "timestamp=$(date +%s%3N),message=hello-logs"

          aws logs get-log-events \
            --log-group-name /action-test/logs --log-stream-name stream1 \
            | jq -e '.events | length >= 1'

          aws logs delete-log-group --log-group-name /action-test/logs
          echo "Logs OK"

      # ── KMS smoke test ────────────────────────────────────────────────
      - name: "KMS: create key + encrypt/decrypt"
        run: |
          set -euo pipefail

          KEY_ID=$(aws kms create-key --query "KeyMetadata.KeyId" --output text)

          CIPHER=$(aws kms encrypt --key-id "$KEY_ID" \
            --plaintext "$(echo -n 'hello-kms' | base64)" \
            --query "CiphertextBlob" --output text)

          PLAIN=$(aws kms decrypt --key-id "$KEY_ID" \
            --ciphertext-blob "$CIPHER" \
            --query "Plaintext" --output text)

          DECODED=$(echo "$PLAIN" | base64 -d)
          [ "$DECODED" = "hello-kms" ]

          aws kms schedule-key-deletion --key-id "$KEY_ID" --pending-window-in-days 7
          echo "KMS OK"

      # ── Secrets Manager smoke test ────────────────────────────────────
      - name: "SecretsManager: create + get secret"
        run: |
          set -euo pipefail

          aws secretsmanager create-secret --name action-test-secret \
            --secret-string '{"user":"admin","pass":"s3cret"}'

          VAL=$(aws secretsmanager get-secret-value --secret-id action-test-secret \
            --query "SecretString" --output text)
          echo "$VAL" | jq -e '.user == "admin"'

          aws secretsmanager delete-secret --secret-id action-test-secret \
            --force-delete-without-recovery
          echo "SecretsManager OK"

      # ── SES smoke test ────────────────────────────────────────────────
      - name: "SES: verify identity + send email"
        run: |
          set -euo pipefail

          aws ses verify-email-identity --email-address test@example.com

          IDENTITIES=$(aws ses list-identities --query "Identities" --output text)
          echo "$IDENTITIES" | grep -q "test@example.com"

          aws ses send-email \
            --from test@example.com \
            --destination '{"ToAddresses":["dest@example.com"]}' \
            --message '{"Subject":{"Data":"Test"},"Body":{"Text":{"Data":"hello-ses"}}}' \
            | jq -e '.MessageId'

          echo "SES OK"

      # ── API Gateway v2 smoke test ─────────────────────────────────────
      - name: "APIGatewayV2: create + list APIs"
        run: |
          set -euo pipefail

          API_ID=$(aws apigatewayv2 create-api \
            --name action-test-api --protocol-type HTTP \
            --query "ApiId" --output text)

          aws apigatewayv2 get-apis | jq -e '.Items | length >= 1'

          aws apigatewayv2 delete-api --api-id "$API_ID"
          echo "APIGatewayV2 OK"

      # ── IAM smoke test ────────────────────────────────────────────────
      - name: "IAM: create user + role"
        run: |
          set -euo pipefail

          aws iam create-user --user-name action-test-user
          aws iam list-users | jq -e '.Users | map(select(.UserName == "action-test-user")) | length == 1'

          aws iam create-role --role-name action-test-role \
            --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
          aws iam list-roles | jq -e '.Roles | map(select(.RoleName == "action-test-role")) | length == 1'

          aws iam delete-role --role-name action-test-role
          aws iam delete-user --user-name action-test-user
          echo "IAM OK"

      # ── STS smoke test ────────────────────────────────────────────────
      - name: "STS: get-caller-identity + assume-role"
        run: |
          set -euo pipefail

          ACCOUNT=$(aws sts get-caller-identity --query "Account" --output text)
          [ "$ACCOUNT" = "000000000000" ]

          RESULT=$(aws sts assume-role \
            --role-arn arn:aws:iam::123456789012:role/ActionTestRole \
            --role-session-name action-test)
          AK=$(echo "$RESULT" | jq -r '.Credentials.AccessKeyId')
          [ "$(echo "$AK" | head -c4)" = "ASIA" ]
          echo "STS OK"

      # ── Cleanup ───────────────────────────────────────────────────────
      - name: "Dump container logs (on failure)"
        if: failure()
        run: docker logs rustack 2>&1 | tail -500

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Custom port
  # ─────────────────────────────────────────────────────────────────────
  custom-port:
    name: "Action: custom port (5566)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack on port 5566
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}
          port: "5566"

      - name: "Verify: endpoint uses custom port"
        run: |
          set -euo pipefail

          [ "${{ steps.rustack.outputs.endpoint }}" = "http://localhost:5566" ]
          [ "$AWS_ENDPOINT_URL" = "http://localhost:5566" ]
          [ "$LOCALSTACK_ENDPOINT" = "http://localhost:5566" ]

          curl -sf http://localhost:5566/_localstack/health | jq .

          # Port 4566 should NOT be listening
          ! curl -sf http://localhost:4566/_localstack/health 2>/dev/null

          echo "Custom port verified"

      - name: "Verify: AWS operations work on custom port"
        run: |
          set -euo pipefail

          aws s3api create-bucket --bucket port-test
          echo "port test" > /tmp/port.txt
          aws s3api put-object --bucket port-test --key test.txt --body /tmp/port.txt
          aws s3api get-object --bucket port-test --key test.txt /tmp/port-dl.txt
          diff /tmp/port.txt /tmp/port-dl.txt

          aws s3api delete-object --bucket port-test --key test.txt
          aws s3api delete-bucket --bucket port-test
          echo "Custom port operations OK"

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 3: Custom region
  # ─────────────────────────────────────────────────────────────────────
  custom-region:
    name: "Action: custom region (eu-west-1)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack with eu-west-1
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}
          default-region: "eu-west-1"

      - name: "Verify: region is eu-west-1"
        run: |
          set -euo pipefail

          [ "$AWS_DEFAULT_REGION" = "eu-west-1" ]

          # STS should reflect the region
          ARN=$(aws sts get-caller-identity --query "Arn" --output text)
          echo "ARN: $ARN"
          [ -n "$ARN" ]

          # S3 bucket location should reflect the region
          aws s3api create-bucket --bucket region-test
          LOCATION=$(aws s3api get-bucket-location --bucket region-test \
            --query "LocationConstraint" --output text)
          echo "Bucket location: $LOCATION"

          aws s3api delete-bucket --bucket region-test
          echo "Custom region verified"

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 4: Custom credentials
  # ─────────────────────────────────────────────────────────────────────
  custom-credentials:
    name: "Action: custom credentials"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack with custom credentials
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}
          access-key: "MYACCESSKEY123"
          secret-key: "MYSECRETKEY456"

      - name: "Verify: custom credentials exported"
        run: |
          set -euo pipefail

          [ "$AWS_ACCESS_KEY_ID" = "MYACCESSKEY123" ]
          [ "$AWS_SECRET_ACCESS_KEY" = "MYSECRETKEY456" ]

          # Operations should work with these credentials
          aws s3api create-bucket --bucket cred-test
          aws s3api head-bucket --bucket cred-test
          aws s3api delete-bucket --bucket cred-test

          aws sts get-caller-identity | jq -e '.Account'
          echo "Custom credentials verified"

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 5: Services filter — only enable a subset
  # ─────────────────────────────────────────────────────────────────────
  services-filter:
    name: "Action: services filter (s3,sqs,sts)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack with limited services
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}
          services: "s3,sqs,sts"

      - name: "Verify: only requested services are running"
        run: |
          set -euo pipefail

          HEALTH=$(curl -sf http://localhost:4566/_localstack/health)
          echo "$HEALTH" | jq .

          # Verify s3, sqs, sts are running
          echo "$HEALTH" | jq -e '.services.s3 == "running"'
          echo "$HEALTH" | jq -e '.services.sqs == "running"'
          echo "$HEALTH" | jq -e '.services.sts == "running"'

          # Verify total service count is limited (s3 + sqs + sts + apigatewayv2-execution = 4)
          RUNNING=$(echo "$HEALTH" | jq '[.services | to_entries[] | select(.value == "running")] | length')
          echo "Running services: $RUNNING"
          if [ "$RUNNING" -gt 6 ]; then
            echo "::error::Expected <= 6 running services with filter, got $RUNNING"
            exit 1
          fi

      - name: "Verify: enabled services work"
        run: |
          set -euo pipefail

          # S3 should work
          aws s3api create-bucket --bucket filter-test
          echo "filter" > /tmp/filter.txt
          aws s3api put-object --bucket filter-test --key test.txt --body /tmp/filter.txt
          aws s3api delete-object --bucket filter-test --key test.txt
          aws s3api delete-bucket --bucket filter-test

          # SQS should work
          QUEUE_URL=$(aws sqs create-queue --queue-name filter-test-q | jq -r '.QueueUrl')
          aws sqs send-message --queue-url "$QUEUE_URL" --message-body "filtered"
          aws sqs delete-queue --queue-url "$QUEUE_URL"

          # STS should work
          aws sts get-caller-identity | jq -e '.Account'

          echo "Enabled services verified"

      - name: "Verify: disabled services are not reachable"
        run: |
          set -euo pipefail

          # DynamoDB should NOT be available
          if aws dynamodb list-tables 2>/dev/null; then
            echo "::error::DynamoDB should not be available with services=s3,sqs,sts"
            exit 1
          fi
          echo "Disabled services correctly unavailable"

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 6: Log level configuration
  # ─────────────────────────────────────────────────────────────────────
  log-level:
    name: "Action: log level (debug)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack with debug logging
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}
          log-level: "debug"

      - name: "Verify: debug logs appear"
        run: |
          set -euo pipefail

          # Make a request to generate log output
          aws s3api create-bucket --bucket log-test
          aws s3api head-bucket --bucket log-test
          aws s3api delete-bucket --bucket log-test

          # Check container logs contain DEBUG-level entries
          LOGS=$(docker logs rustack 2>&1)
          if echo "$LOGS" | grep -qi "DEBUG\|debug"; then
            echo "Debug logging confirmed"
          else
            echo "::warning::No DEBUG entries found in logs (may depend on log format)"
            echo "$LOGS" | tail -30
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 7: Wait timeout — verify fast startup
  # ─────────────────────────────────────────────────────────────────────
  wait-timeout:
    name: "Action: wait timeout"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack with short timeout (succeeds)
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}
          wait-timeout: "60"

      - name: "Verify: service is healthy"
        run: |
          set -euo pipefail
          curl -sf http://localhost:4566/_localstack/health | jq .
          echo "Service healthy within timeout"

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Job 8: Cross-service integration (SNS → SQS fan-out)
  # ─────────────────────────────────────────────────────────────────────
  cross-service:
    name: "Action: cross-service integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Rustack
        id: rustack
        uses: ./
        with:
          image-tag: ${{ github.event.inputs.image-tag || 'latest' }}

      - name: "SNS→SQS fan-out: publish to topic, receive from queue"
        run: |
          set -euo pipefail

          # Create SQS queue
          QUEUE_URL=$(aws sqs create-queue --queue-name fanout-queue | jq -r '.QueueUrl')
          QUEUE_ARN=$(aws sqs get-queue-attributes --queue-url "$QUEUE_URL" \
            --attribute-names QueueArn --query "Attributes.QueueArn" --output text)

          # Create SNS topic and subscribe SQS
          TOPIC_ARN=$(aws sns create-topic --name fanout-topic --query "TopicArn" --output text)
          aws sns subscribe --topic-arn "$TOPIC_ARN" --protocol sqs \
            --notification-endpoint "$QUEUE_ARN"

          # Publish to SNS
          aws sns publish --topic-arn "$TOPIC_ARN" --message "fanout-message"

          # Receive from SQS (with retry)
          MSG=""
          for i in $(seq 1 10); do
            MSG=$(aws sqs receive-message --queue-url "$QUEUE_URL" \
              --max-number-of-messages 1 --wait-time-seconds 2 \
              --query "Messages[0].Body" --output text 2>/dev/null || echo "None")
            [ "$MSG" != "None" ] && [ -n "$MSG" ] && break
            sleep 1
          done

          echo "Received: $MSG"
          echo "$MSG" | grep -q "fanout-message"

          # Cleanup
          aws sns delete-topic --topic-arn "$TOPIC_ARN"
          aws sqs delete-queue --queue-url "$QUEUE_URL"
          echo "Cross-service SNS→SQS fan-out OK"

      - name: "SSM + KMS: SecureString parameter"
        run: |
          set -euo pipefail

          aws ssm put-parameter --name /cross/secure \
            --value "super-secret" --type SecureString

          VAL=$(aws ssm get-parameter --name /cross/secure \
            --with-decryption --query "Parameter.Value" --output text)
          [ "$VAL" = "super-secret" ]

          aws ssm delete-parameter --name /cross/secure
          echo "SSM SecureString OK"

      - name: "Events→Logs: rule targeting"
        run: |
          set -euo pipefail

          # Create log group for target
          aws logs create-log-group --log-group-name /cross/events-target

          # Create rule with target
          aws events put-rule --name cross-rule \
            --event-pattern '{"source":["test.app"]}' --state ENABLED

          LOG_GROUP_ARN="arn:aws:logs:us-east-1:000000000000:log-group:/cross/events-target"
          aws events put-targets --rule cross-rule \
            --targets "Id=log-target,Arn=$LOG_GROUP_ARN"

          TARGETS=$(aws events list-targets-by-rule --rule cross-rule)
          echo "$TARGETS" | jq -e '.Targets | length >= 1'

          # Cleanup
          aws events remove-targets --rule cross-rule --ids log-target
          aws events delete-rule --name cross-rule
          aws logs delete-log-group --log-group-name /cross/events-target
          echo "Events targeting OK"

      - name: "Dump container logs (on failure)"
        if: failure()
        run: docker logs rustack 2>&1 | tail -500

      - name: Cleanup
        if: always()
        run: docker rm -f rustack 2>/dev/null || true
