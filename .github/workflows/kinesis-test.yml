name: kinesis-test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  kinesis-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and start RustStack
        id: ruststack
        run: |
          cargo build --release -p ruststack-server

          GATEWAY_LISTEN=0.0.0.0:4566 \
          LOG_LEVEL=warn \
          cargo run --release -p ruststack-server &

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4566/_localstack/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server did not start within 30s"
              exit 1
            fi
            sleep 1
          done

          echo "endpoint=http://localhost:4566" >> "$GITHUB_OUTPUT"

          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=us-east-1" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=test" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=test" >> "$GITHUB_ENV"

      # ── CreateStream + DescribeStream ───────────────────────────
      - name: "CreateStream + DescribeStream"
        run: |
          set -euo pipefail

          aws kinesis create-stream \
            --stream-name ci-test-stream \
            --shard-count 2

          STATUS=$(aws kinesis describe-stream \
            --stream-name ci-test-stream \
            --query "StreamDescription.StreamStatus" --output text)
          [ "$STATUS" = "ACTIVE" ]

          SHARD_COUNT=$(aws kinesis describe-stream \
            --stream-name ci-test-stream \
            --query "StreamDescription.Shards | length(@)" --output text)
          [ "$SHARD_COUNT" = "2" ]

      # ── DescribeStreamSummary ───────────────────────────────────
      - name: "DescribeStreamSummary"
        run: |
          set -euo pipefail

          SHARD_COUNT=$(aws kinesis describe-stream-summary \
            --stream-name ci-test-stream \
            --query "StreamDescriptionSummary.OpenShardCount" --output text)
          [ "$SHARD_COUNT" = "2" ]

      # ── ListStreams ─────────────────────────────────────────────
      - name: "ListStreams"
        run: |
          set -euo pipefail

          COUNT=$(aws kinesis list-streams \
            --query "StreamNames | length(@)" --output text)
          [ "$COUNT" -ge 1 ]

      # ── PutRecord + GetRecords ──────────────────────────────────
      - name: "PutRecord + GetRecords"
        run: |
          set -euo pipefail

          SHARD_ID=$(aws kinesis describe-stream \
            --stream-name ci-test-stream \
            --query "StreamDescription.Shards[0].ShardId" --output text)

          aws kinesis put-record \
            --stream-name ci-test-stream \
            --partition-key "key1" \
            --data "dGVzdCBtZXNzYWdl"

          ITERATOR=$(aws kinesis get-shard-iterator \
            --stream-name ci-test-stream \
            --shard-id "$SHARD_ID" \
            --shard-iterator-type TRIM_HORIZON \
            --query "ShardIterator" --output text)

          RECORD_COUNT=$(aws kinesis get-records \
            --shard-iterator "$ITERATOR" \
            --query "Records | length(@)" --output text)
          [ "$RECORD_COUNT" -ge 1 ]

      # ── PutRecords (batch) ──────────────────────────────────────
      - name: "PutRecords (batch)"
        run: |
          set -euo pipefail

          RESULT=$(aws kinesis put-records \
            --stream-name ci-test-stream \
            --records \
              Data=cmVjb3JkMQ==,PartitionKey=key1 \
              Data=cmVjb3JkMg==,PartitionKey=key2 \
              Data=cmVjb3JkMw==,PartitionKey=key3)
          FAILED=$(echo "$RESULT" | jq '.FailedRecordCount')
          [ "$FAILED" = "0" ]

      # ── ListShards ──────────────────────────────────────────────
      - name: "ListShards"
        run: |
          set -euo pipefail

          SHARD_COUNT=$(aws kinesis list-shards \
            --stream-name ci-test-stream \
            --query "Shards | length(@)" --output text)
          [ "$SHARD_COUNT" -ge 2 ]

      # ── Tags: add, list, remove ─────────────────────────────────
      - name: "Tags: add, list, remove"
        run: |
          set -euo pipefail

          aws kinesis add-tags-to-stream \
            --stream-name ci-test-stream \
            --tags env=ci,team=platform

          TAG_COUNT=$(aws kinesis list-tags-for-stream \
            --stream-name ci-test-stream \
            --query "Tags | length(@)" --output text)
          [ "$TAG_COUNT" = "2" ]

          aws kinesis remove-tags-from-stream \
            --stream-name ci-test-stream \
            --tag-keys "team"

          TAG_COUNT=$(aws kinesis list-tags-for-stream \
            --stream-name ci-test-stream \
            --query "Tags | length(@)" --output text)
          [ "$TAG_COUNT" = "1" ]

      # ── Retention period ────────────────────────────────────────
      - name: "IncreaseStreamRetentionPeriod"
        run: |
          set -euo pipefail

          aws kinesis increase-stream-retention-period \
            --stream-name ci-test-stream \
            --retention-period-hours 48

          RETENTION=$(aws kinesis describe-stream \
            --stream-name ci-test-stream \
            --query "StreamDescription.RetentionPeriodHours" --output text)
          [ "$RETENTION" = "48" ]

      # ── DescribeLimits ──────────────────────────────────────────
      - name: "DescribeLimits"
        run: |
          set -euo pipefail

          RESULT=$(aws kinesis describe-limits)
          echo "$RESULT" | jq -e '.ShardLimit != null'
          echo "$RESULT" | jq -e '.OpenShardCount != null'

      # ── Stream consumers ────────────────────────────────────────
      - name: "RegisterStreamConsumer + ListStreamConsumers"
        run: |
          set -euo pipefail

          STREAM_ARN=$(aws kinesis describe-stream \
            --stream-name ci-test-stream \
            --query "StreamDescription.StreamARN" --output text)

          aws kinesis register-stream-consumer \
            --stream-arn "$STREAM_ARN" \
            --consumer-name "ci-consumer"

          COUNT=$(aws kinesis list-stream-consumers \
            --stream-arn "$STREAM_ARN" \
            --query "Consumers | length(@)" --output text)
          [ "$COUNT" -ge 1 ]

          aws kinesis deregister-stream-consumer \
            --stream-arn "$STREAM_ARN" \
            --consumer-name "ci-consumer"

      # ── DeleteStream ────────────────────────────────────────────
      - name: "DeleteStream"
        run: |
          set -euo pipefail

          aws kinesis delete-stream --stream-name ci-test-stream

          # Verify deletion
          ! aws kinesis describe-stream --stream-name ci-test-stream 2>/dev/null

      # ── Cleanup ─────────────────────────────────────────────────
      - name: "Cleanup"
        if: always()
        run: |
          set -uo pipefail
          aws kinesis delete-stream --stream-name ci-test-stream 2>/dev/null || true
          echo "Cleanup complete."
