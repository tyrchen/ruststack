name: secretsmanager-test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  secretsmanager-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and start RustStack
        id: ruststack
        run: |
          cargo build --release -p ruststack-server

          GATEWAY_LISTEN=0.0.0.0:4566 \
          LOG_LEVEL=warn \
          cargo run --release -p ruststack-server &

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4566/_localstack/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server did not start within 30s"
              exit 1
            fi
            sleep 1
          done

          echo "endpoint=http://localhost:4566" >> "$GITHUB_OUTPUT"

          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=us-east-1" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=test" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=test" >> "$GITHUB_ENV"

      # ── CreateSecret + GetSecretValue ──────────────────────────────
      - name: "CreateSecret + GetSecretValue: basic CRUD"
        run: |
          set -euo pipefail

          # Create a secret with a string value
          ARN=$(aws secretsmanager create-secret \
            --name "test/ci/db-password" \
            --secret-string '{"username":"admin","password":"s3cret"}' \
            --query "ARN" --output text)
          [ -n "$ARN" ]

          # Get it back
          VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "test/ci/db-password" \
            --query "SecretString" --output text)
          echo "$VALUE" | jq -e '.username == "admin"'

      # ── PutSecretValue + Version Staging ───────────────────────────
      - name: "PutSecretValue: version staging labels"
        run: |
          set -euo pipefail

          # Put a new version
          aws secretsmanager put-secret-value \
            --secret-id "test/ci/db-password" \
            --secret-string '{"username":"admin","password":"n3wp@ss"}'

          # Current should return the new version
          VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "test/ci/db-password" \
            --query "SecretString" --output text)
          echo "$VALUE" | jq -e '.password == "n3wp@ss"'

          # Previous should return the old version
          PREV=$(aws secretsmanager get-secret-value \
            --secret-id "test/ci/db-password" \
            --version-stage "AWSPREVIOUS" \
            --query "SecretString" --output text)
          echo "$PREV" | jq -e '.password == "s3cret"'

      # ── DescribeSecret ─────────────────────────────────────────────
      - name: "DescribeSecret: metadata inspection"
        run: |
          set -euo pipefail

          RESULT=$(aws secretsmanager describe-secret \
            --secret-id "test/ci/db-password")

          echo "$RESULT" | jq -e '.Name == "test/ci/db-password"'
          echo "$RESULT" | jq -e '.VersionIdsToStages | length > 0'

      # ── ListSecrets ────────────────────────────────────────────────
      - name: "ListSecrets: basic list and name filter"
        run: |
          set -euo pipefail

          aws secretsmanager create-secret \
            --name "test/ci/api-key" \
            --secret-string "my-api-key"

          # List all
          COUNT=$(aws secretsmanager list-secrets \
            --query "SecretList | length(@)" --output text)
          [ "$COUNT" -ge 2 ]

          # Filter by name prefix
          FILTERED=$(aws secretsmanager list-secrets \
            --filters "Key=name,Values=test/ci/db" \
            --query "SecretList | length(@)" --output text)
          [ "$FILTERED" = "1" ]

      # ── ListSecretVersionIds ───────────────────────────────────────
      - name: "ListSecretVersionIds: enumerate versions"
        run: |
          set -euo pipefail

          RESULT=$(aws secretsmanager list-secret-version-ids \
            --secret-id "test/ci/db-password" \
            --include-deprecated)
          COUNT=$(echo "$RESULT" | jq '.Versions | length')
          [ "$COUNT" -ge 2 ]

      # ── DeleteSecret + RestoreSecret ───────────────────────────────
      - name: "DeleteSecret + RestoreSecret: scheduled deletion"
        run: |
          set -euo pipefail

          aws secretsmanager create-secret \
            --name "test/ci/to-delete" \
            --secret-string "ephemeral"

          # Schedule deletion
          aws secretsmanager delete-secret \
            --secret-id "test/ci/to-delete" \
            --recovery-window-in-days 7

          # GetSecretValue should fail
          ! aws secretsmanager get-secret-value \
            --secret-id "test/ci/to-delete" 2>/dev/null

          # Restore
          aws secretsmanager restore-secret \
            --secret-id "test/ci/to-delete"

          # Should work again
          VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "test/ci/to-delete" \
            --query "SecretString" --output text)
          [ "$VALUE" = "ephemeral" ]

      # ── UpdateSecret ───────────────────────────────────────────────
      - name: "UpdateSecret: metadata and value update"
        run: |
          set -euo pipefail

          aws secretsmanager update-secret \
            --secret-id "test/ci/api-key" \
            --description "Updated API key" \
            --secret-string "updated-api-key"

          DESC=$(aws secretsmanager describe-secret \
            --secret-id "test/ci/api-key" \
            --query "Description" --output text)
          [ "$DESC" = "Updated API key" ]

          VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "test/ci/api-key" \
            --query "SecretString" --output text)
          [ "$VALUE" = "updated-api-key" ]

      # ── GetRandomPassword ──────────────────────────────────────────
      - name: "GetRandomPassword: configurable generation"
        run: |
          set -euo pipefail

          # Default 32 chars
          PW=$(aws secretsmanager get-random-password \
            --query "RandomPassword" --output text)
          [ "${#PW}" = "32" ]

          # 64 chars, no punctuation
          PW2=$(aws secretsmanager get-random-password \
            --password-length 64 \
            --exclude-punctuation \
            --query "RandomPassword" --output text)
          [ "${#PW2}" = "64" ]

      # ── Tags ───────────────────────────────────────────────────────
      - name: "TagResource + UntagResource"
        run: |
          set -euo pipefail

          aws secretsmanager tag-resource \
            --secret-id "test/ci/db-password" \
            --tags "Key=env,Value=ci" "Key=team,Value=backend"

          TAG_COUNT=$(aws secretsmanager describe-secret \
            --secret-id "test/ci/db-password" \
            --query "Tags | length(@)" --output text)
          [ "$TAG_COUNT" = "2" ]

          aws secretsmanager untag-resource \
            --secret-id "test/ci/db-password" \
            --tag-keys "team"

          TAG_COUNT=$(aws secretsmanager describe-secret \
            --secret-id "test/ci/db-password" \
            --query "Tags | length(@)" --output text)
          [ "$TAG_COUNT" = "1" ]

      # ── RotateSecret + CancelRotateSecret ──────────────────────────
      - name: "RotateSecret + CancelRotateSecret"
        run: |
          set -euo pipefail

          aws secretsmanager rotate-secret \
            --secret-id "test/ci/db-password" \
            --rotation-lambda-arn "arn:aws:lambda:us-east-1:000000000000:function:my-rotation"

          ENABLED=$(aws secretsmanager describe-secret \
            --secret-id "test/ci/db-password" \
            --query "RotationEnabled" --output text)
          [ "$ENABLED" = "True" ]

          aws secretsmanager cancel-rotate-secret \
            --secret-id "test/ci/db-password"

      # ── BatchGetSecretValue ────────────────────────────────────────
      - name: "BatchGetSecretValue: bulk retrieval"
        run: |
          set -euo pipefail

          RESULT=$(aws secretsmanager batch-get-secret-value \
            --secret-id-list "test/ci/db-password" "test/ci/api-key")
          COUNT=$(echo "$RESULT" | jq '.SecretValues | length')
          [ "$COUNT" = "2" ]

      # ── Resource Policies ──────────────────────────────────────────
      - name: "PutResourcePolicy + GetResourcePolicy + DeleteResourcePolicy"
        run: |
          set -euo pipefail

          POLICY='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"secretsmanager:GetSecretValue","Resource":"*"}]}'

          aws secretsmanager put-resource-policy \
            --secret-id "test/ci/db-password" \
            --resource-policy "$POLICY"

          GOT=$(aws secretsmanager get-resource-policy \
            --secret-id "test/ci/db-password" \
            --query "ResourcePolicy" --output text)
          [ -n "$GOT" ]

          aws secretsmanager delete-resource-policy \
            --secret-id "test/ci/db-password"

      # ── ValidateResourcePolicy ─────────────────────────────────────
      - name: "ValidateResourcePolicy: always valid stub"
        run: |
          set -euo pipefail

          RESULT=$(aws secretsmanager validate-resource-policy \
            --resource-policy '{"Version":"2012-10-17","Statement":[]}')
          echo "$RESULT" | jq -e '.PolicyValidationPassed == true'

      # ── UpdateSecretVersionStage ───────────────────────────────────
      - name: "UpdateSecretVersionStage: promote AWSPENDING"
        run: |
          set -euo pipefail

          aws secretsmanager create-secret \
            --name "test/ci/stage-test" \
            --secret-string "v1"

          V1_ID=$(aws secretsmanager describe-secret \
            --secret-id "test/ci/stage-test" \
            --query "VersionIdsToStages | keys(@)[0]" --output text)

          # Put v2 as AWSPENDING
          V2_ID=$(aws secretsmanager put-secret-value \
            --secret-id "test/ci/stage-test" \
            --secret-string "v2" \
            --version-stages "AWSPENDING" \
            --query "VersionId" --output text)

          # Promote
          aws secretsmanager update-secret-version-stage \
            --secret-id "test/ci/stage-test" \
            --version-stage "AWSCURRENT" \
            --move-to-version-id "$V2_ID" \
            --remove-from-version-id "$V1_ID"

          # Current should be v2
          VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "test/ci/stage-test" \
            --query "SecretString" --output text)
          [ "$VALUE" = "v2" ]

      # ── ForceDeleteWithoutRecovery ─────────────────────────────────
      - name: "ForceDeleteWithoutRecovery: immediate deletion"
        run: |
          set -euo pipefail

          aws secretsmanager create-secret \
            --name "test/ci/force-del" \
            --secret-string "bye"

          aws secretsmanager delete-secret \
            --secret-id "test/ci/force-del" \
            --force-delete-without-recovery

          ! aws secretsmanager get-secret-value \
            --secret-id "test/ci/force-del" 2>/dev/null

      # ── Cleanup ────────────────────────────────────────────────────
      - name: "Cleanup"
        if: always()
        run: |
          set -uo pipefail
          for SECRET in test/ci/db-password test/ci/api-key test/ci/to-delete \
                        test/ci/stage-test test/ci/force-del; do
            aws secretsmanager delete-secret \
              --secret-id "$SECRET" \
              --force-delete-without-recovery 2>/dev/null || true
          done
          echo "Cleanup complete."
