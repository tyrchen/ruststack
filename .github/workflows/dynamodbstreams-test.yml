name: dynamodbstreams-test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  dynamodbstreams-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and start RustStack
        id: ruststack
        run: |
          cargo build --release -p ruststack-server

          GATEWAY_LISTEN=0.0.0.0:4566 \
          LOG_LEVEL=warn \
          cargo run --release -p ruststack-server &

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4566/_localstack/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server did not start within 30s"
              exit 1
            fi
            sleep 1
          done

          echo "endpoint=http://localhost:4566" >> "$GITHUB_OUTPUT"

          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=us-east-1" >> "$GITHUB_ENV"
          echo "AWS_ACCESS_KEY_ID=test" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=test" >> "$GITHUB_ENV"

      # ── Create DynamoDB table with stream ───────────────────────
      - name: "Create DynamoDB table with stream enabled"
        run: |
          set -euo pipefail

          aws dynamodb create-table \
            --table-name ci-stream-table \
            --attribute-definitions AttributeName=pk,AttributeType=S \
            --key-schema AttributeName=pk,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --stream-specification StreamEnabled=true,StreamViewType=NEW_AND_OLD_IMAGES

          STREAM_ARN=$(aws dynamodb describe-table \
            --table-name ci-stream-table \
            --query "Table.LatestStreamArn" --output text)
          [ -n "$STREAM_ARN" ] && [ "$STREAM_ARN" != "None" ]

          echo "STREAM_ARN=$STREAM_ARN" >> "$GITHUB_ENV"

      # ── ListStreams ─────────────────────────────────────────────
      - name: "ListStreams"
        run: |
          set -euo pipefail

          COUNT=$(aws dynamodbstreams list-streams \
            --table-name ci-stream-table \
            --query "Streams | length(@)" --output text)
          [ "$COUNT" -ge 1 ]

      # ── DescribeStream ──────────────────────────────────────────
      - name: "DescribeStream"
        run: |
          set -euo pipefail

          RESULT=$(aws dynamodbstreams describe-stream \
            --stream-arn "$STREAM_ARN")
          echo "$RESULT" | jq -e '.StreamDescription.StreamStatus == "ENABLED"'
          echo "$RESULT" | jq -e '.StreamDescription.StreamViewType == "NEW_AND_OLD_IMAGES"'

          SHARD_ID=$(echo "$RESULT" | jq -r '.StreamDescription.Shards[0].ShardId')
          echo "SHARD_ID=$SHARD_ID" >> "$GITHUB_ENV"

      # ── Put items to generate stream records ────────────────────
      - name: "Put items to generate stream records"
        run: |
          set -euo pipefail

          aws dynamodb put-item \
            --table-name ci-stream-table \
            --item '{"pk":{"S":"item1"},"data":{"S":"hello"}}'

          aws dynamodb put-item \
            --table-name ci-stream-table \
            --item '{"pk":{"S":"item2"},"data":{"S":"world"}}'

          aws dynamodb put-item \
            --table-name ci-stream-table \
            --item '{"pk":{"S":"item1"},"data":{"S":"updated"}}'

      # ── GetShardIterator + GetRecords ───────────────────────────
      - name: "GetShardIterator + GetRecords"
        run: |
          set -euo pipefail

          ITERATOR=$(aws dynamodbstreams get-shard-iterator \
            --stream-arn "$STREAM_ARN" \
            --shard-id "$SHARD_ID" \
            --shard-iterator-type TRIM_HORIZON \
            --query "ShardIterator" --output text)
          [ -n "$ITERATOR" ]

          RESULT=$(aws dynamodbstreams get-records \
            --shard-iterator "$ITERATOR")
          RECORD_COUNT=$(echo "$RESULT" | jq '.Records | length')
          [ "$RECORD_COUNT" -ge 1 ]

          # Verify records contain both new and old images
          echo "$RESULT" | jq -e '.Records[0].dynamodb.Keys != null'

      # ── Cleanup ─────────────────────────────────────────────────
      - name: "Cleanup"
        if: always()
        run: |
          set -uo pipefail
          aws dynamodb delete-table --table-name ci-stream-table 2>/dev/null || true
          echo "Cleanup complete."
