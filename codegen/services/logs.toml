[service]
name = "logs"
display_name = "CloudWatch Logs"
rust_prefix = "Logs"
namespace = "com.amazonaws.cloudwatchlogs"
protocol = "awsJson1_1"

[protocol]
serde_rename = "camelCase"
emit_serde_derives = true
target_prefix = "Logs_20140328"

[operations]
phase0 = [
    "CreateLogGroup", "DeleteLogGroup", "DescribeLogGroups",
    "CreateLogStream", "DeleteLogStream", "DescribeLogStreams",
    "PutLogEvents", "GetLogEvents", "FilterLogEvents",
    "PutRetentionPolicy", "DeleteRetentionPolicy",
]
phase1 = [
    "PutMetricFilter", "DeleteMetricFilter", "DescribeMetricFilters",
    "PutSubscriptionFilter", "DeleteSubscriptionFilter", "DescribeSubscriptionFilters",
    "PutResourcePolicy", "DeleteResourcePolicy", "DescribeResourcePolicies",
    "TagResource", "UntagResource", "ListTagsForResource",
    "TagLogGroup", "UntagLogGroup", "ListTagsLogGroup",
]
phase2 = [
    "PutDestination", "PutDestinationPolicy", "DeleteDestination", "DescribeDestinations",
    "AssociateKmsKey", "DisassociateKmsKey",
    "StartQuery", "StopQuery", "GetQueryResults", "DescribeQueries",
    "PutQueryDefinition", "DeleteQueryDefinition", "DescribeQueryDefinitions",
]
phase3 = [
    "CreateExportTask", "CancelExportTask", "DescribeExportTasks",
    "TestMetricFilter",
]

[errors.custom]
MissingAction = { status = 400, message = "Missing required header: X-Amz-Target" }
InvalidAction = { status = 400, message = "Operation is not supported" }

[output]
file_layout = "flat"
