[service]
name = "kinesis"
display_name = "Kinesis"
rust_prefix = "Kinesis"
namespace = "com.amazonaws.kinesis"
protocol = "awsJson1_1"

[protocol]
serde_rename = "PascalCase"
emit_serde_derives = true
target_prefix = "Kinesis_20131202"

[operations]
phase0 = [
    "CreateStream", "DeleteStream", "DescribeStream", "DescribeStreamSummary",
    "ListStreams", "UpdateShardCount",
    "PutRecord", "PutRecords",
    "GetRecords", "GetShardIterator",
    "ListShards",
]
phase1 = [
    "AddTagsToStream", "RemoveTagsFromStream", "ListTagsForStream",
    "IncreaseStreamRetentionPeriod", "DecreaseStreamRetentionPeriod",
    "MergeShards", "SplitShard",
    "StartStreamEncryption", "StopStreamEncryption",
    "DescribeLimits",
]
phase2 = [
    "RegisterStreamConsumer", "DeregisterStreamConsumer",
    "DescribeStreamConsumer", "ListStreamConsumers",
    "SubscribeToShard",
]
phase3 = [
    "GetResourcePolicy", "PutResourcePolicy", "DeleteResourcePolicy",
]

[errors.custom]
MissingAction = { status = 400, message = "Missing required header: X-Amz-Target" }
InvalidAction = { status = 400, message = "Operation is not supported" }

[output]
file_layout = "flat"
