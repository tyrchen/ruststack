[service]
name = "secretsmanager"
display_name = "Secrets Manager"
rust_prefix = "SecretsManager"
namespace = "com.amazonaws.secretsmanager"
protocol = "awsJson1_1"

[protocol]
serde_rename = "PascalCase"
emit_serde_derives = true
target_prefix = "secretsmanager"

[operations]
phase0 = [
    "CreateSecret", "DescribeSecret", "GetSecretValue", "PutSecretValue",
    "UpdateSecret", "DeleteSecret", "RestoreSecret",
    "ListSecrets", "ListSecretVersionIds",
    "GetRandomPassword",
]
phase1 = [
    "TagResource", "UntagResource",
    "UpdateSecretVersionStage",
    "RotateSecret", "CancelRotateSecret",
    "BatchGetSecretValue",
]
phase2 = [
    "GetResourcePolicy", "PutResourcePolicy", "DeleteResourcePolicy",
    "ValidateResourcePolicy",
    "ReplicateSecretToRegions", "RemoveRegionsFromReplication",
    "StopReplicationToReplica",
]

[errors.custom]
MissingAction = { status = 400, message = "Missing required header: X-Amz-Target" }
InvalidAction = { status = 400, message = "Operation is not supported" }

[output]
file_layout = "flat"
